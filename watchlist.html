<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--Website Description-->
    <meta 
        name="description" 
        content="MovieSphere Watchlist lets users search, save and manage their favorite movies and TV shows in one place.">

    <!--Keywords for SEO-->
    <meta 
        name="keywords" 
        content="MovieSphere, movies, TV shows, entertainment, watchlist, reviews, ratings">

    <!--Author-->
    <meta 
        name="author" 
        content="Nikos Andriopoulos">

    <!--Browser Compatibility-->
    <meta 
        http-equiv="X-UA-Compatible" 
        content="IE=edge">

    <!--Browser Theme Color-->
    <meta 
        name="theme-color" 
        content="#000000">

    <title>MovieSphere | Watchlist</title>

    <!--Bootstrap Icons-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet">

    <!--Bootstrap CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!--Custom CSS-->
    <link href="css/style.css"
          rel="stylesheet">

</head>

<body>

    <!--Navigation Bar-->
    <nav class="navbar navbar-expand-lg navbar-dark shadow sticky-top">

        <div class="container">

            <!--Logo-->
            <a class="navbar-brand fw-bold" href="index.html">

                <img src="images/moviesphere-logo.png"
                     alt="MovieSphere Logo"
                     class="logo-img">

            </a>

            <!--Hamburger Menu Button-->
            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav"
                    aria-controls="navbarNav"
                    aria-expanded="false"
                    aria-label="Toggle navigation">
                
                <span class="navbar-toggler-icon"></span>
                    
            </button>
            
            <!--Navigation Links-->
            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav ms-auto">

                    <!--Home-->
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>

                    <!--Watchlist-->
                    <li class="nav-item">
                        <a class="nav-link active" href="watchlist.html">Watchlist</a>
                    </li>

                    <!--Analytics-->
                    <li class="nav-item">
                        <a class="nav-link" href="analytics.html">Analytics</a>
                    </li>

                    <!--About-->
                    <li class="nav-item">
                        <a class="nav-link" href="about.html">About</a>
                    </li>

                    <!--Contact-->
                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">Contact</a>
                    </li>

                    <!--Theme Toggle Button-->
                    <li class="nav-item">

                        <button class="theme-toggle-btn" type="button">

                            <i class="bi bi-sun-fill"></i>

                        </button>

                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!--Watchlist Section-->
    <section class="watchlist-section">

        <div class="container">

            <!--Page Title-->
            <h1 class="watchlist-title">My Watchlist</h1>

            <!--Subtitle-->
            <p class="watchlist-subtitle">Search and save your favorite movies and TV shows.</p>

            <!--Search Bar-->
            <div class="search-container">

                <input type="text"
                       class="movie-search-input"
                       placeholder="Search for movies or TV shows...">

                <button class="search-btn">Search</button>

            </div>

            <!--Movie Search Results-->
            <div class="movie-results-container">



            </div>

            <!--Saved Movies Title-->
            <h2 class="saved-movies-title">Saved Movies</h2>

            <!--Filtering Buttons-->
            <div class="filter-buttons">

                <button class="filter-btn active-filter" data-filter="all">

                    All

                </button>

                <button class="filter-btn" data-filter="watched">

                    Watched

                </button>

                <button class="filter-btn" data-filter="unwatched">

                    Unwatched

                </button>

            </div>

            <!--Saved Movies Container-->
            <div class="saved-movies-container">



            </div>

            <!--Clear Watchlist Button-->
            <div class="text-center mt-4">

                <button class="clear-watchlist-btn">

                    Clear Watchlist

                </button>

            </div>

        </div>

    </section>

    <!--Footer-->
    <footer>

        <div class="container">

            <p class="mb-2">&copy; 2026 MovieSphere | All Rights Reserved.</p>

            <!--Social Media Links-->
            <div class="social-icons">

                <i class="bi bi-facebook"></i>
                <i class="bi bi-twitter"></i>
                <i class="bi bi-instagram"></i>
                <i class="bi bi-youtube"></i>

            </div>

        </div>

    </footer>

    <!--Bootstrap JS-->
    <script 
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

    <!--API JS-->
    <script
        src="js/api.js">
    </script>

    <!--Dark Mode JS-->
    <script
        src="js/darkmode.js">
    </script>

    <!--Watchlist JS-->
    <script 
        src="js/watchlist.js">
    </script>

</body>

</html>
